name: apis_mobile_ucs
description: "Projeto didático Flutter - demonstração de APIs nativas Android: câmera, galeria, áudio, contatos e biometria."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+1
  audioplayers: ^6.0.0
  flutter_contacts: ^1.1.9+2
  local_auth: ^2.3.0
  photo_manager: ^3.2.3
  path_provider: ^2.1.4
  photo_manager_image_provider: ^2.2.0
  record: ^6.2.1
  geolocator: ^14.0.1
  sensors_plus: ^6.1.2
  connectivity_plus: ^7.0.0
  mobile_scanner: ^7.1.3
  share_plus: ^11.0.0
  device_info_plus: ^12.2.0
  battery_plus: ^7.0.0
  vibration: ^3.1.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
